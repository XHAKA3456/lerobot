# Flow Matching Task-Conditioned Policy — Training Config for aic_ur5e_sim
#
# Usage:
#   python -m lerobot.scripts.lerobot_train \
#     --config_path bi_so101_configs/scripts/train_flowmatching_tc.yaml

# ---- Dataset ----
dataset:
  repo_id: xhaka3456/aic_ur5e_sim_v3
  root: /home/sst/lerobot_datasets/aic_ur5e_sim_v3
  episodes: null
  video_backend: torchcodec
  image_transforms:
    enable: true
    max_num_transforms: 2
    random_order: false
    tfs:
      brightness:
        weight: 1.0
        type: ColorJitter
        kwargs:
          brightness: [0.8, 1.2]
      contrast:
        weight: 1.0
        type: ColorJitter
        kwargs:
          contrast: [0.8, 1.2]
      saturation:
        weight: 0.5
        type: ColorJitter
        kwargs:
          saturation: [0.8, 1.2]

# ---- Output ----
output_dir: outputs/train/flowmatching_tc_aic_ur5e_sim3
job_name: flowmatching_tc_aic_ur5e_sim

# ---- Policy ----
policy:
  type: flowmatching_tc

  n_obs_steps: 1
  chunk_size: 20
  n_action_steps: 20

  # Task conditioning
  num_tasks: 3

  # ---- Input features ----
  input_features:
    observation.state:
      type: STATE
      shape: [26]
    observation.images.left_camera:
      type: VISUAL
      shape: [3, 480, 640]
    observation.images.center_camera:
      type: VISUAL
      shape: [3, 480, 640]
    observation.images.right_camera:
      type: VISUAL
      shape: [3, 480, 640]

  # ---- Output features ----
  output_features:
    action:
      type: ACTION
      shape: [7]

  normalization_mapping:
    VISUAL: MEAN_STD
    STATE: MEAN_STD
    ACTION: MEAN_STD

  # Vision backbone (frozen DINOv2 ViT-B/14)
  dinov2_model_name: facebook/dinov2-base

  # Transformer dimensions
  dim_model: 512
  n_heads: 8
  dim_feedforward: 3200
  dropout: 0.1

  n_obs_encoder_layers: 6
  n_velocity_layers: 6

  # Flow matching (pi0-style)
  num_inference_steps: 10
  time_sampling_beta_alpha: 1.5
  time_sampling_beta_beta: 1.0
  time_sampling_scale: 0.999
  time_sampling_offset: 0.001
  min_period: 0.004
  max_period: 4.0

  # Optimizer
  optimizer_lr: 1.0e-4
  optimizer_weight_decay: 1.0e-4

  # LR Scheduler (CosineDecayWithWarmup)
  scheduler_warmup_steps: 5000
  scheduler_decay_steps: 100000
  scheduler_decay_lr: 1.0e-6

  device: cuda
  use_amp: true

  # Hub upload
  push_to_hub: true
  repo_id: xhaka3456/flowmatching_tc_aic_ur5e_sim3
  private: false

# ---- Training loop ----
batch_size: 24
steps: 140000
num_workers: 18

log_freq: 200
save_checkpoint: true
save_freq: 10000
eval_freq: 0

seed: 42

use_policy_training_preset: true

# ---- W&B ----
wandb:
  enable: false
  project: aic_ur5e_flowmatching_tc
