# Flow Matching Task-Conditioned V0 - V1Command 6D delta dataset (Colab)
#
# Dataset: xhaka3456/aic_ur5e_sim_v4_tc_v1cmd_750eps
#   - 3 tasks: insert_sfp_port_0 (210), insert_sfp_port_1 (240), insert_sc (300)
#   - Collected with DataCollectingCheatCodeV1Command (residual 6D command labels)
#   - Actual control uses strong cheat pose; saved labels are bounded 6D residual commands
#
# Usage on Colab:
#   1) Mount drive (optional) or download dataset to /content/data/
#   2) Run:
#      python -m lerobot.scripts.lerobot_train \
#        --config_path /content/lerobot/bi_so101_configs/scripts/train_flowmatching_tc_v0_v1cmd_colab.yaml

dataset:
  repo_id: xhaka3456/aic_ur5e_sim_v4_tc_v1cmd_750eps
  root: /content/data/aic_ur5e_sim_v4_tc_v1cmd_750eps
  episodes: null
  video_backend: torchcodec
  image_transforms:
    enable: true
    max_num_transforms: 2
    random_order: false
    tfs:
      brightness:
        weight: 1.0
        type: ColorJitter
        kwargs:
          brightness: [0.8, 1.2]
      contrast:
        weight: 1.0
        type: ColorJitter
        kwargs:
          contrast: [0.8, 1.2]
      saturation:
        weight: 0.5
        type: ColorJitter
        kwargs:
          saturation: [0.8, 1.2]

output_dir: /content/outputs/train/flowmatching_tc_v1cmd_delta_aic_ur5e_sim_v4_750eps_100k
job_name: flowmatching_tc_v1cmd_delta_aic_ur5e_sim_v4_colab_750eps_100k
resume: false

policy:
  type: flowmatching_tc_v0

  n_obs_steps: 4
  chunk_size: 20
  n_action_steps: 2
  num_tasks: 3
  use_latest_image_only: true

  input_features:
    observation.state:
      type: STATE
      shape: [26]
    observation.images.left_camera:
      type: VISUAL
      shape: [3, 480, 640]
    observation.images.center_camera:
      type: VISUAL
      shape: [3, 480, 640]
    observation.images.right_camera:
      type: VISUAL
      shape: [3, 480, 640]

  output_features:
    action:
      type: ACTION
      shape: [6]

  normalization_mapping:
    VISUAL: MEAN_STD
    STATE: MEAN_STD
    ACTION: MEAN_STD

  dinov2_model_name: facebook/dinov2-base
  dim_model: 512
  n_heads: 8
  dim_feedforward: 3200
  dropout: 0.1
  n_obs_encoder_layers: 6
  n_velocity_layers: 6

  num_inference_steps: 10
  time_sampling_beta_alpha: 1.5
  time_sampling_beta_beta: 1.0
  time_sampling_scale: 0.999
  time_sampling_offset: 0.001
  min_period: 0.004
  max_period: 4.0

  optimizer_lr: 1.0e-4
  optimizer_weight_decay: 1.0e-4
  scheduler_warmup_steps: 5000
  scheduler_decay_steps: 100000
  scheduler_decay_lr: 1.0e-6

  enable_final_phase_weighting: true
  base_loss_weight: 1.0
  near_port_loss_weight: 2.0
  contact_onset_loss_weight: 1.5
  near_port_descent_ratio_center: 1.5
  near_port_descent_ratio_scale: 4.0
  near_port_speed_center: 1.0
  near_port_speed_scale: 3.0
  contact_force_level_center: 1.0
  contact_force_level_scale: 2.0
  contact_force_delta_center: 0.5
  contact_force_delta_scale: 4.0

  enable_sfp_alignment_weighting: false
  sfp_alignment_xy_loss_weight: 4.0
  sfp_alignment_z_loss_weight: 0.0
  sfp_alignment_rot_loss_weight: 2.0
  sfp_alignment_z_min: 0.18
  sfp_alignment_z_max: 0.30
  sfp_alignment_z_gate_scale: 80.0

  device: cuda
  use_amp: true

  push_to_hub: true
  repo_id: xhaka3456/flowmatching_tc_v1cmd_delta_aic_ur5e_sim_v4_750eps_100k
  private: false

batch_size: 24
steps: 100000
num_workers: 12

log_freq: 200
save_checkpoint: true
save_freq: 20000
eval_freq: 0

seed: 42
use_policy_training_preset: true

wandb:
  enable: false
  project: flowmatching_tc_v1cmd_delta_aic_ur5e_sim_v4_colab_750eps_100k
