# Flow Matching Task-Conditioned V0 - V1Command 6D delta dataset with perturbation (Colab)
#
# Dataset: xhaka3456/aic_ur5e_sim_v4_tc_v1cmd_770eps_pert
#   - 3 tasks: insert_sfp_port_0, insert_sfp_port_1, insert_sc
#   - Clean episodes: SC(200), SFP0(150), SFP1(150) = 500
#   - Perturbed episodes: SC(150), SFP0(100), SFP1(100) = 350
#   - Perturbation: random XY offset (max 10mm SC / 12mm SFP), decays in last 5cm
#
# Changes from 750eps_100k:
#   - New perturb data for alignment learning
#   - optimizer_lr: 1e-4 → 1.5e-4
#   - steps: 100k → 140k
#   - scheduler_decay_steps: 100k → 180k
#   - scheduler_decay_lr: 1e-6 → 5e-6
#   - enable_sfp_alignment_weighting: false → true
#
# Usage on Colab:
#   python -m lerobot.scripts.lerobot_train \
#     --config_path /content/lerobot/bi_so101_configs/scripts/train_flowmatching_tc_v0_v1cmd_pert_colab.yaml

dataset:
  repo_id: xhaka3456/aic_ur5e_sim_v4_tc_v1cmd_770eps_pert
  root: /content/data/aic_ur5e_sim_v4_tc_v1cmd_770eps_pert
  episodes: null
  video_backend: torchcodec
  image_transforms:
    enable: true
    max_num_transforms: 2
    random_order: false
    tfs:
      brightness:
        weight: 1.0
        type: ColorJitter
        kwargs:
          brightness: [0.8, 1.2]
      contrast:
        weight: 1.0
        type: ColorJitter
        kwargs:
          contrast: [0.8, 1.2]
      saturation:
        weight: 0.5
        type: ColorJitter
        kwargs:
          saturation: [0.8, 1.2]

output_dir: /content/outputs/train/flowmatching_tc_v1cmd_delta_aic_ur5e_sim_v4_770eps_pert_140k
job_name: flowmatching_tc_v1cmd_delta_aic_ur5e_sim_v4_770eps_pert_140k
resume: false

policy:
  type: flowmatching_tc_v0

  n_obs_steps: 4
  chunk_size: 20
  n_action_steps: 2
  num_tasks: 3
  use_latest_image_only: true

  input_features:
    observation.state:
      type: STATE
      shape: [26]
    observation.images.left_camera:
      type: VISUAL
      shape: [3, 480, 640]
    observation.images.center_camera:
      type: VISUAL
      shape: [3, 480, 640]
    observation.images.right_camera:
      type: VISUAL
      shape: [3, 480, 640]

  output_features:
    action:
      type: ACTION
      shape: [6]

  normalization_mapping:
    VISUAL: MEAN_STD
    STATE: MEAN_STD
    ACTION: MEAN_STD

  dinov2_model_name: facebook/dinov2-base
  dim_model: 512
  n_heads: 8
  dim_feedforward: 3200
  dropout: 0.1
  n_obs_encoder_layers: 6
  n_velocity_layers: 6

  num_inference_steps: 10
  time_sampling_beta_alpha: 1.5
  time_sampling_beta_beta: 1.0
  time_sampling_scale: 0.999
  time_sampling_offset: 0.001
  min_period: 0.004
  max_period: 4.0

  optimizer_lr: 1.5e-4
  optimizer_weight_decay: 1.0e-4
  scheduler_warmup_steps: 5000
  scheduler_decay_steps: 140000
  scheduler_decay_lr: 5.0e-6

  enable_final_phase_weighting: true
  base_loss_weight: 1.0
  near_port_loss_weight: 2.0
  contact_onset_loss_weight: 1.5
  near_port_descent_ratio_center: 1.5
  near_port_descent_ratio_scale: 4.0
  near_port_speed_center: 1.0
  near_port_speed_scale: 3.0
  contact_force_level_center: 1.0
  contact_force_level_scale: 2.0
  contact_force_delta_center: 0.5
  contact_force_delta_scale: 4.0

  enable_sfp_alignment_weighting: true
  sfp_alignment_xy_loss_weight: 4.0
  sfp_alignment_z_loss_weight: 0.0
  sfp_alignment_rot_loss_weight: 2.0
  sfp_alignment_z_min: 0.18
  sfp_alignment_z_max: 0.30
  sfp_alignment_z_gate_scale: 80.0

  device: cuda
  use_amp: true

  push_to_hub: true
  repo_id: xhaka3456/flowmatching_tc_v1cmd_delta_aic_ur5e_sim_v4_770eps_pert_140k
  private: false

batch_size: 24
steps: 140000
num_workers: 12

log_freq: 200
save_checkpoint: true
save_freq: 20000
eval_freq: 0

seed: 42
use_policy_training_preset: true

wandb:
  enable: false
  project: flowmatching_tc_v1cmd_delta_aic_ur5e_sim_v4_770eps_pert_140k
