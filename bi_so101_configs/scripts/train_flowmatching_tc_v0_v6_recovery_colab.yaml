# Flow Matching TC V0 - V6 RECOVERY (Colab)
#
# 목적: v5 cleanbaseline(챔피언, 100k=155)에 A3 복원+입구 spiral 데이터를 추가해
#   입구 정렬/안착 병목을 개선하는지 측정. 설정은 cleanbaseline과 동일(공정 비교),
#   데이터셋만 v6로 교체.
#   - 복원데이터: SFP0 104 + SFP1 105 = 209ep (정렬버그 수정 + entrance spiral)
#   - 모든 보정 weighting OFF (cleanbaseline과 동일)
#   - 추론도 rolling/guard 없이 표준 residual->target 으로 평가할 것
#
# Dataset: xhaka3456/aic_ur5e_sim_v6_recovery
#   task_index: sfp_port_0=0, sfp_port_1=1, sc=2
#   1410ep (v5 1201 + 복원 209) / 384618 frames
#   frame분포 idx0=89432 idx1=97383 idx2=197803
#
# 실행 (Colab):
#   python -m lerobot.scripts.lerobot_train \
#     --config_path /content/lerobot/bi_so101_configs/scripts/train_flowmatching_tc_v0_v6_recovery_colab.yaml

dataset:
  repo_id: xhaka3456/aic_ur5e_sim_v6_recovery
  root: /content/data/aic_ur5e_sim_v6_recovery
  episodes: null
  video_backend: torchcodec
  image_transforms:
    enable: true
    max_num_transforms: 2
    random_order: false
    tfs:
      brightness:
        weight: 1.0
        type: ColorJitter
        kwargs:
          brightness: [0.8, 1.2]
      contrast:
        weight: 1.0
        type: ColorJitter
        kwargs:
          contrast: [0.8, 1.2]
      saturation:
        weight: 0.5
        type: ColorJitter
        kwargs:
          saturation: [0.8, 1.2]

output_dir: /content/outputs/train/flowmatching_tc_v6_recovery_150k
job_name: flowmatching_tc_v6_recovery_150k
resume: false

policy:
  type: flowmatching_tc_v0

  n_obs_steps: 4
  chunk_size: 20
  n_action_steps: 2
  num_tasks: 3
  use_latest_image_only: true

  input_features:
    observation.state:
      type: STATE
      shape: [26]
    observation.images.left_camera:
      type: VISUAL
      shape: [3, 480, 640]
    observation.images.center_camera:
      type: VISUAL
      shape: [3, 480, 640]
    observation.images.right_camera:
      type: VISUAL
      shape: [3, 480, 640]

  output_features:
    action:
      type: ACTION
      shape: [6]

  normalization_mapping:
    VISUAL: MEAN_STD
    STATE: MEAN_STD
    ACTION: MEAN_STD

  dinov2_model_name: facebook/dinov2-base
  dim_model: 512
  n_heads: 8
  dim_feedforward: 3200
  dropout: 0.1
  n_obs_encoder_layers: 6
  n_velocity_layers: 6

  num_inference_steps: 10
  time_sampling_beta_alpha: 1.5
  time_sampling_beta_beta: 1.0
  time_sampling_scale: 0.999
  time_sampling_offset: 0.001
  min_period: 0.004
  max_period: 4.0

  optimizer_lr: 1.5e-4
  optimizer_weight_decay: 1.0e-4
  optimizer_grad_clip_norm: 1.0   # v5 bimodal action 안전 마진 (기본 10.0 → 1.0)
  scheduler_warmup_steps: 5000
  scheduler_decay_steps: 150000
  scheduler_decay_lr: 5.0e-6

  # === CLEAN BASELINE과 동일: 모든 보정 weighting OFF ===
  enable_final_phase_weighting: false
  enable_sfp_alignment_weighting: false

  device: cuda
  use_amp: true

  push_to_hub: true
  repo_id: xhaka3456/flowmatching_tc_v6_recovery_150k
  private: false

batch_size: 24
steps: 150000
num_workers: 12

log_freq: 200
save_checkpoint: true
save_freq: 20000
eval_freq: 0

seed: 42
use_policy_training_preset: true

wandb:
  enable: false
  project: flowmatching_tc_v6_recovery_150k
